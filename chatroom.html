<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻聊天室</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 50%, #1a0b2e 100%);
            color: #f0e6ff;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: rgba(45, 27, 78, 0.9);
            border-right: 1px solid #ba55d3;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e91e63;
        }

        .user-info {
            background: rgba(186, 85, 211, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #ba55d3;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .user-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-id {
            font-size: 12px;
            color: #d8b4fe;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: rgba(139, 92, 246, 0.2);
            color: #d8b4fe;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 500;
        }

        .tab:hover {
            background: rgba(186, 85, 211, 0.3);
        }

        .tab.active {
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
            color: white;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
        }

        .contact-list {
            padding: 10px;
        }

        .contact-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .contact-item:hover {
            background: rgba(186, 85, 211, 0.25);
        }

        .contact-item.active {
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: bold;
        }

        .contact-status {
            font-size: 12px;
            color: #d8b4fe;
        }

        .add-btn {
            width: calc(100% - 20px);
            padding: 12px;
            margin: 10px;
            background: rgba(186, 85, 211, 0.2);
            border: 2px dashed #ba55d3;
            color: #f0e6ff;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
        }

        .add-btn:hover {
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
            border-color: transparent;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-header {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(186, 85, 211, 0.3);
        }

        .chat-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .chat-subtitle {
            color: #d8b4fe;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            background: rgba(45, 27, 78, 0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(186, 85, 211, 0.2);
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .message-author {
            font-weight: bold;
            margin-right: 10px;
        }

        .message-time {
            font-size: 12px;
            color: #c4b5fd;
        }

        .message-content {
            margin-left: 40px;
        }

        .message-text {
            background: rgba(139, 92, 246, 0.3);
            padding: 10px 15px;
            border-radius: 12px;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .message-own .message-text {
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
        }

        .message-file {
            background: rgba(139, 92, 246, 0.25);
            padding: 15px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .message-file:hover {
            background: rgba(186, 85, 211, 0.35);
        }

        .file-preview {
            max-width: 300px;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .input-area {
            background: rgba(45, 27, 78, 0.8);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(186, 85, 211, 0.2);
        }

        .file-drop {
            border: 2px dashed rgba(186, 85, 211, 0.5);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            background: rgba(139, 92, 246, 0.1);
        }

        .file-drop:hover, .file-drop.drag-over {
            border-color: #e91e63;
            background: rgba(233, 30, 99, 0.15);
        }

        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .file-item {
            background: rgba(139, 92, 246, 0.2);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .file-remove {
            color: #ff6b9d;
            cursor: pointer;
            font-weight: bold;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(186, 85, 211, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            color: #f0e6ff;
            font-size: 14px;
        }

        .message-input:focus {
            outline: none;
            border-color: #e91e63;
        }

        .message-input::placeholder {
            color: rgba(216, 180, 254, 0.6);
        }

        .send-btn {
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .system-msg {
            text-align: center;
            color: #c4b5fd;
            font-style: italic;
            margin: 20px 0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 11, 46, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(45, 27, 78, 0.95);
            padding: 30px;
            border-radius: 20px;
            min-width: 400px;
            border: 1px solid #ba55d3;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(186, 85, 211, 0.3);
            border-radius: 10px;
            color: #f0e6ff;
            margin-bottom: 15px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #e91e63;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-btn.cancel {
            background: rgba(139, 92, 246, 0.2);
            color: #f0e6ff;
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
            color: white;
        }

        .user-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .user-list-item {
            padding: 12px;
            background: rgba(139, 92, 246, 0.15);
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(186, 85, 211, 0.2);
        }

        .user-list-item:hover {
            background: rgba(186, 85, 211, 0.25);
        }

        .user-list-item.selected {
            border-color: #e91e63;
            background: rgba(233, 30, 99, 0.2);
        }

        .member-tag {
            display: inline-flex;
            align-items: center;
            background: rgba(139, 92, 246, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .member-tag-remove {
            color: #ff6b9d;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(45, 27, 78, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ba55d3 0%, #e91e63 100%);
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            color: #c4b5fd;
            padding: 40px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-indicator.online {
            background-color: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        .status-indicator.offline {
            background-color: #6b7280;
        }
    </style>
    <!-- Socket.io CDN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>✨ 梦幻聊天室</h2>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-name" id="userName">加载中...</div>
                <div class="user-id" id="userId">ID: -</div>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('friends')">👫 好友</button>
                <button class="tab" onclick="switchTab('groups')">👥 群组</button>
                <button class="tab" onclick="switchTab('public')">🌐 公共</button>
            </div>
        </div>
        <div class="tab-content" id="tabContent">
            <button class="add-btn" id="addBtn">+ 添加/创建</button>
            <div class="contact-list" id="contactList"></div>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <div class="chat-title" id="chatTitle">选择一个聊天</div>
            <div class="chat-subtitle" id="chatSubtitle">从好友、群组或公共聊天中选择</div>
        </div>
        <div class="messages" id="messages">
            <div class="empty-state">选择一个聊天开始消息 ✨</div>
        </div>
        <div class="input-area" id="inputArea">
            <div class="file-drop" id="fileDrop">
                📁 拖拽文件到这里或点击选择（无大小限制！）
                <input type="file" id="fileInput" multiple style="display: none;">
            </div>
            <div class="file-list" id="fileList"></div>
            <div class="input-row">
                <input type="text" class="message-input" id="messageInput" placeholder="输入消息...">
                <button class="send-btn" id="sendBtn">发送 ✨</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">弹窗</div>
            <div id="modalBody"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" id="modalConfirm">确认</button>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            'linear-gradient(135deg, #ba55d3 0%, #e91e63 100%)',
            'linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%)',
            'linear-gradient(135deg, #ec4899 0%, #f43f5e 100%)',
            'linear-gradient(135deg, #a78bfa 0%, #c084fc 100%)'
        ];
        const adjectives = ['梦幻的', '可爱的', '快乐的', '勇敢的', '智慧的', '温柔的'];
        const nouns = ['精灵', '仙子', '天使', '星星', '月亮', '花朵'];

        let socket = null;
        let currentUser = null;
        let selectedFiles = [];
        let currentTab = 'friends';
        let currentChat = null;
        let currentChatType = null;
        let allUsers = [];
        let allMessages = [];
        let allFriends = [];
        let allGroups = [];

        function randomId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function randomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function randomName() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const num = Math.floor(Math.random() * 100);
            return adj + noun + num;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        function initUser() {
            // 尝试从本地存储加载用户信息
            let userId = localStorage.getItem('chat_user_id');
            let userName = localStorage.getItem('chat_user_name');
            let userColor = localStorage.getItem('chat_user_color');

            if (!userId) {
                userId = randomId();
                userName = randomName();
                userColor = randomColor();
                localStorage.setItem('chat_user_id', userId);
                localStorage.setItem('chat_user_name', userName);
                localStorage.setItem('chat_user_color', userColor);
            }

            currentUser = {
                id: userId,
                name: userName,
                color: userColor
            };

            document.getElementById('userAvatar').textContent = currentUser.name[0];
            document.getElementById('userAvatar').style.background = currentUser.color;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userId').textContent = 'ID: ' + currentUser.id;
        }

        function initSocket() {
            // 连接到服务器
            socket = io();

            socket.on('connect', () => {
                console.log('已连接到服务器');
                // 发送用户上线信息
                socket.emit('user:online', currentUser);
            });

            // 初始化数据
            socket.on('init:data', (data) => {
                allUsers = data.users;
                allMessages = data.messages;
                allFriends = data.friends;
                allGroups = data.groups;
                renderContacts();
                renderMessages();
            });

            // 用户列表更新
            socket.on('users:update', (users) => {
                allUsers = users;
                renderContacts();
            });

            // 公共消息
            socket.on('message:public', (msg) => {
                allMessages.push(msg);
                if (currentChatType === 'public') {
                    renderMessages();
                }
            });

            // 私聊消息
            socket.on('message:private', (msg) => {
                allMessages.push(msg);
                if (currentChatType === 'private' && 
                    ((msg.fromId === currentUser.id && msg.toId === currentChat.id) ||
                     (msg.fromId === currentChat.id && msg.toId === currentUser.id))) {
                    renderMessages();
                }
            });

            // 群组消息
            socket.on('message:group', (msg) => {
                allMessages.push(msg);
                if (currentChatType === 'group' && msg.groupId === currentChat.id) {
                    renderMessages();
                }
            });

            // 好友列表更新
            socket.on('friends:update', (friends) => {
                allFriends = friends;
                renderContacts();
            });

            // 群组列表更新
            socket.on('groups:update', (groups) => {
                allGroups = groups;
                renderContacts();
            });

            socket.on('disconnect', () => {
                console.log('与服务器断开连接');
            });
        }

        function getMessages(chatType, chatId) {
            return allMessages.filter(m => {
                if (chatType === 'public') {
                    return m.type === 'public';
                } else if (chatType === 'private') {
                    return m.type === 'private' && 
                           ((m.fromId === currentUser.id && m.toId === chatId) || 
                            (m.fromId === chatId && m.toId === currentUser.id));
                } else if (chatType === 'group') {
                    return m.type === 'group' && m.groupId === chatId;
                }
                return false;
            });
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            
            if (!currentChat || !currentChatType) {
                container.innerHTML = '<div class="empty-state">选择一个聊天开始消息 ✨</div>';
                return;
            }

            const msgs = getMessages(currentChatType, currentChat.id);
            
            container.innerHTML = '';
            
            if (msgs.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无消息，发送第一条吧！💫</div>';
                return;
            }

            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message' + (msg.fromId === currentUser.id ? ' message-own' : '');
                
                const header = document.createElement('div');
                header.className = 'message-header';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.fromName[0];
                avatar.style.background = msg.fromColor || colors[0];
                
                const author = document.createElement('span');
                author.className = 'message-author';
                author.textContent = msg.fromName;
                
                const time = document.createElement('span');
                time.className = 'message-time';
                time.textContent = formatTime(msg.timestamp);
                
                header.appendChild(avatar);
                header.appendChild(author);
                header.appendChild(time);
                
                const content = document.createElement('div');
                content.className = 'message-content';
                
                if (msg.contentType === 'text') {
                    const text = document.createElement('div');
                    text.className = 'message-text';
                    text.textContent = msg.content;
                    content.appendChild(text);
                } else if (msg.contentType === 'file' && msg.file) {
                    const fileDiv = document.createElement('div');
                    fileDiv.className = 'message-file';
                    fileDiv.onclick = function() { downloadFile(msg.file); };
                    fileDiv.textContent = msg.file.name + ' (' + formatSize(msg.file.size) + ')';
                    content.appendChild(fileDiv);
                    
                    if (msg.file.type.indexOf('image/') === 0) {
                        const img = document.createElement('img');
                        img.className = 'file-preview';
                        img.src = msg.file.data;
                        img.onclick = function() { window.open(msg.file.data, '_blank'); };
                        content.appendChild(img);
                    } else if (msg.file.type.indexOf('video/') === 0) {
                        const video = document.createElement('video');
                        video.className = 'file-preview';
                        video.src = msg.file.data;
                        video.controls = true;
                        content.appendChild(video);
                    }
                }
                
                div.appendChild(header);
                div.appendChild(content);
                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        }

        function downloadFile(file) {
            const link = document.createElement('a');
            link.href = file.data;
            link.download = file.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function sendMessage() {
            if (!currentChat || !currentChatType) return;

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text && selectedFiles.length === 0) return;

            if (text) {
                const msg = {
                    type: currentChatType,
                    contentType: 'text',
                    content: text,
                    fromId: currentUser.id,
                    fromName: currentUser.name,
                    fromColor: currentUser.color
                };
                if (currentChatType === 'private') {
                    msg.toId = currentChat.id;
                    socket.emit('message:private', msg);
                } else if (currentChatType === 'group') {
                    msg.groupId = currentChat.id;
                    socket.emit('message:group', msg);
                } else if (currentChatType === 'public') {
                    socket.emit('message:public', msg);
                }
            }

            selectedFiles.forEach(file => {
                const msg = {
                    type: currentChatType,
                    contentType: 'file',
                    content: '',
                    fromId: currentUser.id,
                    fromName: currentUser.name,
                    fromColor: currentUser.color,
                    file: file
                };
                if (currentChatType === 'private') {
                    msg.toId = currentChat.id;
                    socket.emit('message:private', msg);
                } else if (currentChatType === 'group') {
                    msg.groupId = currentChat.id;
                    socket.emit('message:group', msg);
                } else if (currentChatType === 'public') {
                    socket.emit('message:public', msg);
                }
            });

            input.value = '';
            selectedFiles = [];
            updateFileList();
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedFiles.push({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result
                    });
                    updateFileList();
                };
                reader.readAsDataURL(file);
            });
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            selectedFiles.forEach((file, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = '<span>' + file.name + '</span><span class="file-remove" onclick="removeFile(' + i + ')">✕</span>';
                list.appendChild(item);
            });
        }

        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const addBtn = document.getElementById('addBtn');
            if (tab === 'friends') {
                addBtn.textContent = '+ 添加好友';
            } else if (tab === 'groups') {
                addBtn.textContent = '+ 创建群组';
            } else {
                addBtn.textContent = '+ 更多选项';
            }
            
            renderContacts();
            
            if (tab === 'public') {
                selectPublicChat();
            }
        }

        function renderContacts() {
            const list = document.getElementById('contactList');
            list.innerHTML = '';

            if (currentTab === 'friends') {
                const myFriends = allFriends.filter(f => f.userId === currentUser.id);
                if (myFriends.length === 0) {
                    list.innerHTML = '<div class="empty-state">还没有好友，点击"添加好友"找小伙伴吧！💫</div>';
                    return;
                }
                
                myFriends.forEach(friend => {
                    const user = allUsers.find(u => u.id === friend.friendId);
                    const div = document.createElement('div');
                    div.className = 'contact-item' + (currentChat && currentChat.id === friend.friendId ? ' active' : '');
                    div.onclick = function() { selectFriend(friend); };
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'contact-avatar';
                    avatar.textContent = friend.friendName[0];
                    avatar.style.background = friend.friendColor;
                    
                    const info = document.createElement('div');
                    info.className = 'contact-info';
                    
                    const statusSpan = document.createElement('span');
                    statusSpan.className = 'status-indicator ' + (user && user.online ? 'online' : 'offline');
                    
                    info.innerHTML = '<div class="contact-name">' + (statusSpan.outerHTML) + friend.friendName + '</div>' +
                                     '<div class="contact-status">' + (user && user.online ? '在线' : '离线') + '</div>';
                    
                    div.appendChild(avatar);
                    div.appendChild(info);
                    list.appendChild(div);
                });
            } else if (currentTab === 'groups') {
                const myGroups = allGroups.filter(g => g.members && g.members.includes(currentUser.id));
                
                if (myGroups.length === 0) {
                    list.innerHTML = '<div class="empty-state">还没有群组，创建一个吧！🌟</div>';
                    return;
                }
                
                myGroups.forEach(group => {
                    const div = document.createElement('div');
                    div.className = 'contact-item' + (currentChat && currentChat.id === group.id ? ' active' : '');
                    div.onclick = function() { selectGroup(group); };
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'contact-avatar';
                    avatar.textContent = '👥';
                    avatar.style.background = group.color || colors[0];
                    
                    const info = document.createElement('div');
                    info.className = 'contact-info';
                    info.innerHTML = '<div class="contact-name">' + group.name + '</div>' +
                                     '<div class="contact-status">' + (group.members ? group.members.length : 0) + ' 位成员</div>';
                    
                    div.appendChild(avatar);
                    div.appendChild(info);
                    list.appendChild(div);
                });
            }
        }

        function selectFriend(friend) {
            currentChat = { id: friend.friendId, name: friend.friendName, color: friend.friendColor };
            currentChatType = 'private';
            document.getElementById('chatTitle').textContent = friend.friendName;
            document.getElementById('chatSubtitle').textContent = '私密聊天 💕';
            renderContacts();
            renderMessages();
        }

        function selectGroup(group) {
            currentChat = group;
            currentChatType = 'group';
            document.getElementById('chatTitle').textContent = group.name;
            document.getElementById('chatSubtitle').textContent = (group.members ? group.members.length : 0) + ' 位成员';
            renderContacts();
            renderMessages();
        }

        function selectPublicChat() {
            currentChat = { id: 'public', name: '公共聊天室' };
            currentChatType = 'public';
            document.getElementById('chatTitle').textContent = '🌐 公共聊天室';
            document.getElementById('chatSubtitle').textContent = '所有人都能看到这些消息';
            renderContacts();
            renderMessages();
        }

        function showAddFriendModal() {
            const availableUsers = allUsers.filter(u => u.id !== currentUser.id);

            let bodyHTML = '<input type="text" class="modal-input" id="searchInput" placeholder="搜索用户...">';
            bodyHTML += '<div class="user-list" id="userList">';
            
            if (availableUsers.length === 0) {
                bodyHTML += '<div class="empty-state">暂无其他在线用户，等待小伙伴加入吧！✨</div>';
            } else {
                availableUsers.forEach(user => {
                    const isAlreadyFriend = allFriends.some(f => f.userId === currentUser.id && f.friendId === user.id);
                    if (!isAlreadyFriend) {
                        bodyHTML += '<div class="user-list-item" data-id="' + user.id + '" data-name="' + user.name + '" data-color="' + user.color + '" onclick="toggleUser(this)">' +
                                    '<div class="contact-avatar" style="background: ' + user.color + '">' + user.name[0] + '</div>' +
                                    '<div class="contact-info">' +
                                    '<div class="contact-name">' + user.name + '</div>' +
                                    '<div class="contact-status">ID: ' + user.id + '</div>' +
                                    '</div></div>';
                    }
                });
            }
            bodyHTML += '</div>';

            document.getElementById('modalTitle').textContent = '添加好友 ✨';
            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('modalConfirm').onclick = addSelectedFriends;
            document.getElementById('modal').classList.add('show');
        }

        window.toggleUser = function(el) {
            el.classList.toggle('selected');
        }

        function addSelectedFriends() {
            const selected = document.querySelectorAll('.user-list-item.selected');
            if (selected.length === 0) {
                closeModal();
                return;
            }

            selected.forEach(el => {
                const friendData = {
                    userId: currentUser.id,
                    friendId: el.dataset.id,
                    friendName: el.dataset.name,
                    friendColor: el.dataset.color,
                    addedAt: Date.now()
                };
                socket.emit('friend:add', friendData);
            });

            closeModal();
        }

        let selectedGroupMembers = [];

        function showCreateGroupModal() {
            selectedGroupMembers = [currentUser.id];
            const availableUsers = allUsers.filter(u => u.id !== currentUser.id);

            let bodyHTML = '<input type="text" class="modal-input" id="groupNameInput" placeholder="群组名称...">';
            bodyHTML += '<div id="selectedMembers" style="margin-bottom: 10px;"></div>';
            bodyHTML += '<div class="user-list" id="userList">';
            
            if (availableUsers.length === 0) {
                bodyHTML += '<div class="empty-state">暂无其他在线用户！💫</div>';
            } else {
                availableUsers.forEach(user => {
                    bodyHTML += '<div class="user-list-item" data-id="' + user.id + '" data-name="' + user.name + '" onclick="toggleGroupMember(this)">' +
                                '<div class="contact-avatar" style="background: ' + user.color + '">' + user.name[0] + '</div>' +
                                '<div class="contact-info">' +
                                '<div class="contact-name">' + user.name + '</div>' +
                                '</div></div>';
                });
            }
            bodyHTML += '</div>';

            document.getElementById('modalTitle').textContent = '创建群组 🌟';
            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('modalConfirm').onclick = createGroup;
            document.getElementById('modal').classList.add('show');
            updateSelectedMembersDisplay();
        }

        window.toggleGroupMember = function(el) {
            el.classList.toggle('selected');
            const id = el.dataset.id;
            if (selectedGroupMembers.includes(id)) {
                selectedGroupMembers = selectedGroupMembers.filter(m => m !== id);
            } else {
                selectedGroupMembers.push(id);
            }
            updateSelectedMembersDisplay();
        }

        function updateSelectedMembersDisplay() {
            const container = document.getElementById('selectedMembers');
            if (!container) return;
            
            let html = '';
            selectedGroupMembers.forEach(id => {
                const user = allUsers.find(u => u.id === id);
                if (user) {
                    html += '<span class="member-tag">' + user.name;
                    if (id !== currentUser.id) {
                        html += '<span class="member-tag-remove" onclick="removeMemberFromSelection(\'' + id + '\')">×</span>';
                    }
                    html += '</span>';
                }
            });
            container.innerHTML = html;
        }

        window.removeMemberFromSelection = function(id) {
            selectedGroupMembers = selectedGroupMembers.filter(m => m !== id);
            const item = document.querySelector('.user-list-item[data-id="' + id + '"]');
            if (item) item.classList.remove('selected');
            updateSelectedMembersDisplay();
        }

        function createGroup() {
            const nameInput = document.getElementById('groupNameInput');
            const name = nameInput.value.trim();
            if (!name || selectedGroupMembers.length < 2) {
                alert('请输入群组名称并至少选择一位其他成员！');
                return;
            }

            const groupData = {
                name: name,
                color: randomColor(),
                members: selectedGroupMembers,
                createdBy: currentUser.id
            };
            socket.emit('group:create', groupData);

            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function handleAddBtnClick() {
            if (currentTab === 'friends') {
                showAddFriendModal();
            } else if (currentTab === 'groups') {
                showCreateGroupModal();
            }
        }

        function init() {
            initUser();
            initSocket();

            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            document.getElementById('addBtn').addEventListener('click', handleAddBtnClick);

            const fileDrop = document.getElementById('fileDrop');
            const fileInput = document.getElementById('fileInput');
            
            fileDrop.addEventListener('click', function() { fileInput.click(); });
            
            fileDrop.addEventListener('dragover', function(e) {
                e.preventDefault();
                fileDrop.classList.add('drag-over');
            });
            
            fileDrop.addEventListener('dragleave', function() {
                fileDrop.classList.remove('drag-over');
            });
            
            fileDrop.addEventListener('drop', function(e) {
                e.preventDefault();
                fileDrop.classList.remove('drag-over');
                handleFiles(e.dataTransfer.files);
            });
            
            fileInput.addEventListener('change', function(e) {
                handleFiles(e.target.files);
                e.target.value = '';
            });
        }

        // 启动应用
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: #16213e;
            padding: 20px;
            border-right: 1px solid #0f3460;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .user-info {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .user-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-id {
            font-size: 12px;
            color: #888;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .message-author {
            font-weight: bold;
            margin-right: 10px;
        }

        .message-time {
            font-size: 12px;
            color: #888;
        }

        .message-content {
            margin-left: 40px;
        }

        .message-text {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
            max-width: 100%;
        }

        .message-own .message-text {
            background: #e94560;
        }

        .message-file {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .message-file:hover {
            background: #1a4a7a;
        }

        .file-preview {
            max-width: 300px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .input-area {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
        }

        .file-drop {
            border: 2px dashed #0f3460;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .file-drop:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .file-item {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-remove {
            color: #e94560;
            cursor: pointer;
            font-weight: bold;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            padding: 12px;
            color: #eee;
            font-size: 14px;
        }

        .message-input:focus {
            outline: none;
            border-color: #e94560;
        }

        .send-btn {
            background: #e94560;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #ff6b6b;
        }

        .system-msg {
            text-align: center;
            color: #888;
            font-style: italic;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Chat Room</h2>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-id" id="userId">ID: -</div>
        </div>
        <div style="color: #888; font-size: 12px;">
            Open this page in multiple tabs to chat!
        </div>
    </div>

    <div class="main">
        <h1>Anonymous Chat</h1>
        <p style="color: #888; margin-bottom: 20px;">No server needed - chat directly!</p>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="file-drop" id="fileDrop">
                Drop files here or click to select (No size limit!)
                <input type="file" id="fileInput" multiple style="display: none;">
            </div>
            <div class="file-list" id="fileList"></div>
            <div class="input-row">
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'chat_messages';
        const CHANNEL_NAME = 'chat_channel';
        
        let currentUser = null;
        let selectedFiles = [];
        let channel = null;

        const colors = ['#e94560', '#0f3460', '#533483', '#e94560', '#00d9ff', '#00ff88', '#ffaa00', '#ff00ff'];
        const adjectives = ['Happy', 'Brave', 'Clever', 'Cute', 'Fast', 'Funny', 'Kind', 'Wise'];
        const nouns = ['Cat', 'Dog', 'Bird', 'Fish', 'Fox', 'Panda', 'Tiger', 'Wolf'];

        function randomId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function randomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function randomName() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const num = Math.floor(Math.random() * 100);
            return adj + noun + num;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        function initUser() {
            const storedId = localStorage.getItem('chat_user_id');
            const storedName = localStorage.getItem('chat_user_name');
            const storedColor = localStorage.getItem('chat_user_color');

            if (storedId && storedName && storedColor) {
                currentUser = { id: storedId, name: storedName, color: storedColor };
            } else {
                currentUser = { id: randomId(), name: randomName(), color: randomColor() };
                localStorage.setItem('chat_user_id', currentUser.id);
                localStorage.setItem('chat_user_name', currentUser.name);
                localStorage.setItem('chat_user_color', currentUser.color);
            }

            document.getElementById('userAvatar').textContent = currentUser.name[0];
            document.getElementById('userAvatar').style.background = currentUser.color;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userId').textContent = 'ID: ' + currentUser.id;
        }

        function getMessages() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveMessage(msg) {
            const msgs = getMessages();
            msgs.push(msg);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            const msgs = getMessages();
            
            container.innerHTML = '';
            
            if (msgs.length === 0) {
                container.innerHTML = '<div class="system-msg">No messages yet. Send the first one!</div>';
                return;
            }

            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message' + (msg.userId === currentUser.id ? ' message-own' : '');
                
                const header = document.createElement('div');
                header.className = 'message-header';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.userName[0];
                avatar.style.background = msg.userColor || '#e94560';
                
                const author = document.createElement('span');
                author.className = 'message-author';
                author.textContent = msg.userName;
                
                const time = document.createElement('span');
                time.className = 'message-time';
                time.textContent = formatTime(msg.timestamp);
                
                header.appendChild(avatar);
                header.appendChild(author);
                header.appendChild(time);
                
                const content = document.createElement('div');
                content.className = 'message-content';
                
                if (msg.type === 'text') {
                    const text = document.createElement('div');
                    text.className = 'message-text';
                    text.textContent = msg.content;
                    content.appendChild(text);
                } else if (msg.type === 'file' && msg.file) {
                    const fileDiv = document.createElement('div');
                    fileDiv.className = 'message-file';
                    fileDiv.onclick = function() { downloadFile(msg.file); };
                    fileDiv.textContent = msg.file.name + ' (' + formatSize(msg.file.size) + ')';
                    content.appendChild(fileDiv);
                    
                    if (msg.file.type.indexOf('image/') === 0) {
                        const img = document.createElement('img');
                        img.className = 'file-preview';
                        img.src = msg.file.data;
                        content.appendChild(img);
                    } else if (msg.file.type.indexOf('video/') === 0) {
                        const video = document.createElement('video');
                        video.className = 'file-preview';
                        video.src = msg.file.data;
                        video.controls = true;
                        content.appendChild(video);
                    }
                }
                
                div.appendChild(header);
                div.appendChild(content);
                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        }

        function downloadFile(file) {
            const link = document.createElement('a');
            link.href = file.data;
            link.download = file.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text && selectedFiles.length === 0) return;

            if (text) {
                const msg = {
                    id: randomId(),
                    type: 'text',
                    content: text,
                    timestamp: Date.now(),
                    userId: currentUser.id,
                    userName: currentUser.name,
                    userColor: currentUser.color
                };
                saveMessage(msg);
                if (channel) channel.postMessage({ type: 'new' });
            }

            selectedFiles.forEach(file => {
                const msg = {
                    id: randomId(),
                    type: 'file',
                    content: '',
                    timestamp: Date.now(),
                    userId: currentUser.id,
                    userName: currentUser.name,
                    userColor: currentUser.color,
                    file: file
                };
                saveMessage(msg);
                if (channel) channel.postMessage({ type: 'new' });
            });

            input.value = '';
            selectedFiles = [];
            updateFileList();
            renderMessages();
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedFiles.push({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result
                    });
                    updateFileList();
                };
                reader.readAsDataURL(file);
            });
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            selectedFiles.forEach((file, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = '<span>' + file.name + '</span><span class="file-remove" onclick="removeFile(' + i + ')">X</span>';
                list.appendChild(item);
            });
        }

        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        };

        function init() {
            initUser();
            
            try {
                channel = new BroadcastChannel(CHANNEL_NAME);
                channel.onmessage = function(event) {
                    if (event.data.type === 'new') {
                        renderMessages();
                    }
                };
            } catch (e) {
                console.log('BroadcastChannel not supported');
            }

            window.addEventListener('storage', function(e) {
                if (e.key === STORAGE_KEY) {
                    renderMessages();
                }
            });

            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            const fileDrop = document.getElementById('fileDrop');
            const fileInput = document.getElementById('fileInput');
            
            fileDrop.addEventListener('click', function() { fileInput.click(); });
            
            fileDrop.addEventListener('dragover', function(e) {
                e.preventDefault();
                fileDrop.style.borderColor = '#e94560';
            });
            
            fileDrop.addEventListener('dragleave', function() {
                fileDrop.style.borderColor = '#0f3460';
            });
            
            fileDrop.addEventListener('drop', function(e) {
                e.preventDefault();
                fileDrop.style.borderColor = '#0f3460';
                handleFiles(e.dataTransfer.files);
            });
            
            fileInput.addEventListener('change', function(e) {
                handleFiles(e.target.files);
                e.target.value = '';
            });

            renderMessages();
        }

        init();
    </script>
</body>
</html>

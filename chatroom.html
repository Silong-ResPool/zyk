<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #0f3460;
        }

        .user-info {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .user-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-id {
            font-size: 12px;
            color: #888;
        }

        .tabs {
            display: flex;
            gap: 5px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: #0f3460;
            color: #888;
            cursor: pointer;
            border-radius: 4px;
        }

        .tab.active {
            background: #e94560;
            color: white;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
        }

        .contact-list {
            padding: 10px;
        }

        .contact-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-item:hover {
            background: #0f3460;
        }

        .contact-item.active {
            background: #e94560;
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: bold;
        }

        .contact-status {
            font-size: 12px;
            color: #888;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            margin: 10px;
            background: #0f3460;
            border: 1px dashed #e94560;
            color: #e94560;
            cursor: pointer;
            border-radius: 8px;
        }

        .add-btn:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-header {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #0f3460;
        }

        .chat-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .chat-subtitle {
            color: #888;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .message-author {
            font-weight: bold;
            margin-right: 10px;
        }

        .message-time {
            font-size: 12px;
            color: #888;
        }

        .message-content {
            margin-left: 40px;
        }

        .message-text {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
            max-width: 100%;
        }

        .message-own .message-text {
            background: #e94560;
        }

        .message-file {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .message-file:hover {
            background: #1a4a7a;
        }

        .file-preview {
            max-width: 300px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .input-area {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
        }

        .file-drop {
            border: 2px dashed #0f3460;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .file-drop:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .file-item {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-remove {
            color: #e94560;
            cursor: pointer;
            font-weight: bold;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            padding: 12px;
            color: #eee;
            font-size: 14px;
        }

        .message-input:focus {
            outline: none;
            border-color: #e94560;
        }

        .send-btn {
            background: #e94560;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #ff6b6b;
        }

        .system-msg {
            text-align: center;
            color: #888;
            font-style: italic;
            margin: 20px 0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 12px;
            min-width: 400px;
            max-width: 90%;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            color: #eee;
            margin-bottom: 15px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #e94560;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-btn.cancel {
            background: #0f3460;
            color: #eee;
        }

        .modal-btn.confirm {
            background: #e94560;
            color: white;
        }

        .user-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .user-list-item {
            padding: 10px;
            background: #0f3460;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-list-item:hover {
            background: #1a4a7a;
        }

        .user-list-item.selected {
            border: 2px solid #e94560;
        }

        .group-members {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            margin-right: 5px;
        }

        .offline-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            margin-right: 5px;
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .member-tag {
            display: inline-flex;
            align-items: center;
            background: #0f3460;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 3px;
        }

        .member-tag-remove {
            color: #e94560;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Chat Room</h2>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-name" id="userName">Loading...</div>
                <div class="user-id" id="userId">ID: -</div>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('friends')">Friends</button>
                <button class="tab" onclick="switchTab('groups')">Groups</button>
                <button class="tab" onclick="switchTab('public')">Public</button>
            </div>
        </div>
        <div class="tab-content" id="tabContent">
            <button class="add-btn" id="addBtn">+ Add / Create</button>
            <div class="contact-list" id="contactList"></div>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <div class="chat-title" id="chatTitle">Select a chat</div>
            <div class="chat-subtitle" id="chatSubtitle">Choose from friends, groups, or public chat</div>
        </div>
        <div class="messages" id="messages">
            <div class="empty-state">Select a chat to start messaging</div>
        </div>
        <div class="input-area" id="inputArea">
            <div class="file-drop" id="fileDrop">
                Drop files here or click to select (No size limit!)
                <input type="file" id="fileInput" multiple style="display: none;">
            </div>
            <div class="file-list" id="fileList"></div>
            <div class="input-row">
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Modal</div>
            <div id="modalBody"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn confirm" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            MESSAGES: 'chat_messages',
            FRIENDS: 'chat_friends',
            GROUPS: 'chat_groups',
            USERS: 'chat_users',
            USER_ID: 'chat_user_id',
            USER_NAME: 'chat_user_name',
            USER_COLOR: 'chat_user_color'
        };
        const CHANNEL_NAME = 'chat_channel';
        
        let currentUser = null;
        let selectedFiles = [];
        let channel = null;
        let currentTab = 'friends';
        let currentChat = null;
        let currentChatType = null;

        const colors = ['#e94560', '#0f3460', '#533483', '#00d9ff', '#00ff88', '#ffaa00', '#ff00ff', '#667eea'];
        const adjectives = ['Happy', 'Brave', 'Clever', 'Cute', 'Fast', 'Funny', 'Kind', 'Wise'];
        const nouns = ['Cat', 'Dog', 'Bird', 'Fish', 'Fox', 'Panda', 'Tiger', 'Wolf'];

        function randomId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function randomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function randomName() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const num = Math.floor(Math.random() * 100);
            return adj + noun + num;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        function getData(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        }

        function setData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
            if (channel) {
                channel.postMessage({ type: 'update', key: key });
            }
        }

        function initUser() {
            const storedId = localStorage.getItem(STORAGE_KEYS.USER_ID);
            const storedName = localStorage.getItem(STORAGE_KEYS.USER_NAME);
            const storedColor = localStorage.getItem(STORAGE_KEYS.USER_COLOR);

            if (storedId && storedName && storedColor) {
                currentUser = { id: storedId, name: storedName, color: storedColor };
            } else {
                currentUser = { id: randomId(), name: randomName(), color: randomColor() };
                localStorage.setItem(STORAGE_KEYS.USER_ID, currentUser.id);
                localStorage.setItem(STORAGE_KEYS.USER_NAME, currentUser.name);
                localStorage.setItem(STORAGE_KEYS.USER_COLOR, currentUser.color);
            }

            const users = getData(STORAGE_KEYS.USERS);
            const existingUser = users.find(u => u.id === currentUser.id);
            if (!existingUser) {
                users.push({
                    id: currentUser.id,
                    name: currentUser.name,
                    color: currentUser.color,
                    online: true,
                    lastSeen: Date.now()
                });
                setData(STORAGE_KEYS.USERS, users);
            } else {
                existingUser.online = true;
                existingUser.lastSeen = Date.now();
                existingUser.name = currentUser.name;
                existingUser.color = currentUser.color;
                setData(STORAGE_KEYS.USERS, users);
            }

            document.getElementById('userAvatar').textContent = currentUser.name[0];
            document.getElementById('userAvatar').style.background = currentUser.color;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userId').textContent = 'ID: ' + currentUser.id;
        }

        function getMessages(chatType, chatId) {
            const allMsgs = getData(STORAGE_KEYS.MESSAGES);
            return allMsgs.filter(m => {
                if (chatType === 'public') {
                    return m.type === 'public';
                } else if (chatType === 'private') {
                    return m.type === 'private' && 
                           ((m.fromId === currentUser.id && m.toId === chatId) || 
                            (m.fromId === chatId && m.toId === currentUser.id));
                } else if (chatType === 'group') {
                    return m.type === 'group' && m.groupId === chatId;
                }
                return false;
            });
        }

        function saveMessage(msg) {
            const msgs = getData(STORAGE_KEYS.MESSAGES);
            msgs.push(msg);
            setData(STORAGE_KEYS.MESSAGES, msgs);
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            
            if (!currentChat || !currentChatType) {
                container.innerHTML = '<div class="empty-state">Select a chat to start messaging</div>';
                return;
            }

            const msgs = getMessages(currentChatType, currentChat.id);
            
            container.innerHTML = '';
            
            if (msgs.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages yet. Send the first one!</div>';
                return;
            }

            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message' + (msg.fromId === currentUser.id ? ' message-own' : '');
                
                const header = document.createElement('div');
                header.className = 'message-header';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.fromName[0];
                avatar.style.background = msg.fromColor || '#e94560';
                
                const author = document.createElement('span');
                author.className = 'message-author';
                author.textContent = msg.fromName;
                
                const time = document.createElement('span');
                time.className = 'message-time';
                time.textContent = formatTime(msg.timestamp);
                
                header.appendChild(avatar);
                header.appendChild(author);
                header.appendChild(time);
                
                const content = document.createElement('div');
                content.className = 'message-content';
                
                if (msg.contentType === 'text') {
                    const text = document.createElement('div');
                    text.className = 'message-text';
                    text.textContent = msg.content;
                    content.appendChild(text);
                } else if (msg.contentType === 'file' && msg.file) {
                    const fileDiv = document.createElement('div');
                    fileDiv.className = 'message-file';
                    fileDiv.onclick = function() { downloadFile(msg.file); };
                    fileDiv.textContent = msg.file.name + ' (' + formatSize(msg.file.size) + ')';
                    content.appendChild(fileDiv);
                    
                    if (msg.file.type.indexOf('image/') === 0) {
                        const img = document.createElement('img');
                        img.className = 'file-preview';
                        img.src = msg.file.data;
                        content.appendChild(img);
                    } else if (msg.file.type.indexOf('video/') === 0) {
                        const video = document.createElement('video');
                        video.className = 'file-preview';
                        video.src = msg.file.data;
                        video.controls = true;
                        content.appendChild(video);
                    }
                }
                
                div.appendChild(header);
                div.appendChild(content);
                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        }

        function downloadFile(file) {
            const link = document.createElement('a');
            link.href = file.data;
            link.download = file.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function sendMessage() {
            if (!currentChat || !currentChatType) return;

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text && selectedFiles.length === 0) return;

            if (text) {
                const msg = {
                    id: randomId(),
                    type: currentChatType,
                    contentType: 'text',
                    content: text,
                    timestamp: Date.now(),
                    fromId: currentUser.id,
                    fromName: currentUser.name,
                    fromColor: currentUser.color
                };
                if (currentChatType === 'private') {
                    msg.toId = currentChat.id;
                } else if (currentChatType === 'group') {
                    msg.groupId = currentChat.id;
                }
                saveMessage(msg);
            }

            selectedFiles.forEach(file => {
                const msg = {
                    id: randomId(),
                    type: currentChatType,
                    contentType: 'file',
                    content: '',
                    timestamp: Date.now(),
                    fromId: currentUser.id,
                    fromName: currentUser.name,
                    fromColor: currentUser.color,
                    file: file
                };
                if (currentChatType === 'private') {
                    msg.toId = currentChat.id;
                } else if (currentChatType === 'group') {
                    msg.groupId = currentChat.id;
                }
                saveMessage(msg);
            });

            input.value = '';
            selectedFiles = [];
            updateFileList();
            renderMessages();
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedFiles.push({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result
                    });
                    updateFileList();
                };
                reader.readAsDataURL(file);
            });
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            selectedFiles.forEach((file, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = '<span>' + file.name + '</span><span class="file-remove" onclick="removeFile(' + i + ')">X</span>';
                list.appendChild(item);
            });
        }

        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        };

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const addBtn = document.getElementById('addBtn');
            if (tab === 'friends') {
                addBtn.textContent = '+ Add Friend';
            } else if (tab === 'groups') {
                addBtn.textContent = '+ Create Group';
            } else {
                addBtn.textContent = '+ More Options';
            }
            
            renderContacts();
            
            if (tab === 'public') {
                selectPublicChat();
            }
        }

        function renderContacts() {
            const list = document.getElementById('contactList');
            list.innerHTML = '';

            if (currentTab === 'friends') {
                const friends = getData(STORAGE_KEYS.FRIENDS).filter(f => f.userId === currentUser.id);
                if (friends.length === 0) {
                    list.innerHTML = '<div class="empty-state">No friends yet. Click "Add Friend" to find someone!</div>';
                    return;
                }
                
                friends.forEach(friend => {
                    const div = document.createElement('div');
                    div.className = 'contact-item' + (currentChat && currentChat.id === friend.friendId ? ' active' : '');
                    div.onclick = () => selectFriend(friend);
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'contact-avatar';
                    avatar.textContent = friend.friendName[0];
                    avatar.style.background = friend.friendColor;
                    
                    const info = document.createElement('div');
                    info.className = 'contact-info';
                    info.innerHTML = '<div class="contact-name">' + friend.friendName + '</div>' +
                                     '<div class="contact-status">Click to chat</div>';
                    
                    div.appendChild(avatar);
                    div.appendChild(info);
                    list.appendChild(div);
                });
            } else if (currentTab === 'groups') {
                const groups = getData(STORAGE_KEYS.GROUPS);
                const myGroups = groups.filter(g => g.members.includes(currentUser.id));
                
                if (myGroups.length === 0) {
                    list.innerHTML = '<div class="empty-state">No groups yet. Create one!</div>';
                    return;
                }
                
                myGroups.forEach(group => {
                    const div = document.createElement('div');
                    div.className = 'contact-item' + (currentChat && currentChat.id === group.id ? ' active' : '');
                    div.onclick = () => selectGroup(group);
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'contact-avatar';
                    avatar.textContent = '👥';
                    avatar.style.background = group.color || '#0f3460';
                    
                    const info = document.createElement('div');
                    info.className = 'contact-info';
                    info.innerHTML = '<div class="contact-name">' + group.name + '</div>' +
                                     '<div class="contact-status">' + group.members.length + ' members</div>';
                    
                    div.appendChild(avatar);
                    div.appendChild(info);
                    list.appendChild(div);
                });
            }
        }

        function selectFriend(friend) {
            currentChat = { id: friend.friendId, name: friend.friendName, color: friend.friendColor };
            currentChatType = 'private';
            document.getElementById('chatTitle').textContent = friend.friendName;
            document.getElementById('chatSubtitle').textContent = 'Private Chat';
            renderContacts();
            renderMessages();
        }

        function selectGroup(group) {
            currentChat = group;
            currentChatType = 'group';
            document.getElementById('chatTitle').textContent = group.name;
            document.getElementById('chatSubtitle').textContent = group.members.length + ' members';
            renderContacts();
            renderMessages();
        }

        function selectPublicChat() {
            currentChat = { id: 'public', name: 'Public Chat' };
            currentChatType = 'public';
            document.getElementById('chatTitle').textContent = 'Public Chat';
            document.getElementById('chatSubtitle').textContent = 'Everyone can see these messages';
            renderContacts();
            renderMessages();
        }

        function showAddFriendModal() {
            const users = getData(STORAGE_KEYS.USERS).filter(u => u.id !== currentUser.id);
            const friends = getData(STORAGE_KEYS.FRIENDS).filter(f => f.userId === currentUser.id);
            const friendIds = friends.map(f => f.friendId);
            const availableUsers = users.filter(u => !friendIds.includes(u.id));

            let bodyHTML = '<input type="text" class="modal-input" id="searchInput" placeholder="Search users...">';
            bodyHTML += '<div class="user-list" id="userList">';
            
            if (availableUsers.length === 0) {
                bodyHTML += '<div class="empty-state">No other users found. Open another tab to create a test user!</div>';
            } else {
                availableUsers.forEach(user => {
                    bodyHTML += '<div class="user-list-item" data-id="' + user.id + '" onclick="toggleUser(this)">' +
                                '<div class="contact-avatar" style="background: ' + user.color + '">' + user.name[0] + '</div>' +
                                '<div class="contact-info">' +
                                '<div class="contact-name">' + user.name + '</div>' +
                                '<div class="contact-status">ID: ' + user.id + '</div>' +
                                '</div></div>';
                });
            }
            bodyHTML += '</div>';

            document.getElementById('modalTitle').textContent = 'Add Friend';
            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('modalConfirm').onclick = addSelectedFriends;
            document.getElementById('modal').classList.add('show');
        }

        window.toggleUser = function(el) {
            el.classList.toggle('selected');
        };

        function addSelectedFriends() {
            const selected = document.querySelectorAll('.user-list-item.selected');
            if (selected.length === 0) {
                closeModal();
                return;
            }

            const friends = getData(STORAGE_KEYS.FRIENDS);
            const users = getData(STORAGE_KEYS.USERS);

            selected.forEach(el => {
                const userId = el.dataset.id;
                const user = users.find(u => u.id === userId);
                if (user) {
                    friends.push({
                        userId: currentUser.id,
                        friendId: user.id,
                        friendName: user.name,
                        friendColor: user.color,
                        addedAt: Date.now()
                    });
                }
            });

            setData(STORAGE_KEYS.FRIENDS, friends);
            closeModal();
            renderContacts();
        }

        let selectedGroupMembers = [];

        function showCreateGroupModal() {
            selectedGroupMembers = [currentUser.id];
            const users = getData(STORAGE_KEYS.USERS).filter(u => u.id !== currentUser.id);

            let bodyHTML = '<input type="text" class="modal-input" id="groupNameInput" placeholder="Group name...">';
            bodyHTML += '<div id="selectedMembers" style="margin-bottom: 10px;"></div>';
            bodyHTML += '<div class="user-list" id="userList">';
            
            if (users.length === 0) {
                bodyHTML += '<div class="empty-state">No other users found. Open another tab!</div>';
            } else {
                users.forEach(user => {
                    const isSelected = selectedGroupMembers.includes(user.id);
                    bodyHTML += '<div class="user-list-item ' + (isSelected ? 'selected' : '') + '" data-id="' + user.id + '" onclick="toggleGroupMember(this)">' +
                                '<div class="contact-avatar" style="background: ' + user.color + '">' + user.name[0] + '</div>' +
                                '<div class="contact-info">' +
                                '<div class="contact-name">' + user.name + '</div>' +
                                '</div></div>';
                });
            }
            bodyHTML += '</div>';

            document.getElementById('modalTitle').textContent = 'Create Group';
            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('modalConfirm').onclick = createGroup;
            document.getElementById('modal').classList.add('show');
            updateSelectedMembersDisplay();
        }

        window.toggleGroupMember = function(el) {
            el.classList.toggle('selected');
            const id = el.dataset.id;
            if (selectedGroupMembers.includes(id)) {
                selectedGroupMembers = selectedGroupMembers.filter(m => m !== id);
            } else {
                selectedGroupMembers.push(id);
            }
            updateSelectedMembersDisplay();
        };

        function updateSelectedMembersDisplay() {
            const container = document.getElementById('selectedMembers');
            if (!container) return;
            
            const users = getData(STORAGE_KEYS.USERS);
            let html = '';
            selectedGroupMembers.forEach(id => {
                const user = users.find(u => u.id === id);
                if (user) {
                    html += '<span class="member-tag">' + user.name;
                    if (id !== currentUser.id) {
                        html += '<span class="member-tag-remove" onclick="removeMemberFromSelection(\'' + id + '\')">×</span>';
                    }
                    html += '</span>';
                }
            });
            container.innerHTML = html;
        }

        window.removeMemberFromSelection = function(id) {
            selectedGroupMembers = selectedGroupMembers.filter(m => m !== id);
            const item = document.querySelector('.user-list-item[data-id="' + id + '"]');
            if (item) item.classList.remove('selected');
            updateSelectedMembersDisplay();
        };

        function createGroup() {
            const nameInput = document.getElementById('groupNameInput');
            const name = nameInput.value.trim();
            if (!name || selectedGroupMembers.length < 2) {
                alert('Please enter a group name and select at least one other member');
                return;
            }

            const groups = getData(STORAGE_KEYS.GROUPS);
            const newGroup = {
                id: randomId(),
                name: name,
                color: randomColor(),
                members: selectedGroupMembers,
                createdBy: currentUser.id,
                createdAt: Date.now()
            };
            groups.push(newGroup);
            setData(STORAGE_KEYS.GROUPS, groups);

            closeModal();
            renderContacts();
            selectGroup(newGroup);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function handleAddBtnClick() {
            if (currentTab === 'friends') {
                showAddFriendModal();
            } else if (currentTab === 'groups') {
                showCreateGroupModal();
            }
        }

        function init() {
            initUser();
            
            try {
                channel = new BroadcastChannel(CHANNEL_NAME);
                channel.onmessage = function(event) {
                    if (event.data.type === 'update') {
                        renderContacts();
                        renderMessages();
                    }
                };
            } catch (e) {
                console.log('BroadcastChannel not supported');
            }

            window.addEventListener('storage', function(e) {
                renderContacts();
                renderMessages();
            });

            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            document.getElementById('addBtn').addEventListener('click', handleAddBtnClick);

            const fileDrop = document.getElementById('fileDrop');
            const fileInput = document.getElementById('fileInput');
            
            fileDrop.addEventListener('click', function() { fileInput.click(); });
            
            fileDrop.addEventListener('dragover', function(e) {
                e.preventDefault();
                fileDrop.style.borderColor = '#e94560';
            });
            
            fileDrop.addEventListener('dragleave', function() {
                fileDrop.style.borderColor = '#0f3460';
            });
            
            fileDrop.addEventListener('drop', function(e) {
                e.preventDefault();
                fileDrop.style.borderColor = '#0f3460';
                handleFiles(e.dataTransfer.files);
            });
            
            fileInput.addEventListener('change', function(e) {
                handleFiles(e.target.files);
                e.target.value = '';
            });

            renderContacts();
        }

        init();
    </script>
</body>
</html>

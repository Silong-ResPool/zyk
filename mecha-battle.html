<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素风机甲对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 48px;
            color: #4ecdc4;
            text-shadow: 4px 4px 0 #e94560;
            margin-bottom: 10px;
        }

        .health-bar-container {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-bottom: 20px;
            padding: 10px;
            background: #0f3460;
            border: 4px solid #4ecdc4;
        }

        .player-health {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-label {
            font-size: 20px;
            font-weight: bold;
            width: 80px;
        }

        .player1 .player-label {
            color: #e94560;
        }

        .player2 .player-label {
            color: #4ecdc4;
        }

        .health-bar {
            width: 200px;
            height: 24px;
            background: #1a1a2e;
            border: 3px solid #fff;
            position: relative;
        }

        .health-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .player1 .health-fill {
            background: linear-gradient(to right, #e94560, #ff6b6b);
        }

        .player2 .health-fill {
            background: linear-gradient(to right, #4ecdc4, #44a08d);
        }

        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        #gameCanvas {
            border: 6px solid #0f3460;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
            image-rendering: pixelated;
        }

        .controls {
            margin-top: 20px;
            padding: 20px;
            background: #0f3460;
            border: 4px solid #4ecdc4;
            width: 800px;
        }

        .controls h3 {
            text-align: center;
            color: #4ecdc4;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .control-layout {
            display: flex;
            justify-content: space-between;
        }

        .player-controls {
            text-align: center;
            width: 45%;
        }

        .player-controls h4 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .player1-controls h4 {
            color: #e94560;
        }

        .player2-controls h4 {
            color: #4ecdc4;
        }

        .key {
            display: inline-block;
            background: #1a1a2e;
            border: 2px solid #fff;
            padding: 5px 12px;
            margin: 3px;
            font-size: 14px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 64px;
            color: #4ecdc4;
            text-shadow: 4px 4px 0 #e94560;
            margin-bottom: 30px;
        }

        .overlay button {
            background: #4ecdc4;
            color: #1a1a2e;
            border: 4px solid #fff;
            padding: 20px 60px;
            font-size: 28px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .overlay button:hover {
            background: #e94560;
            color: #fff;
            transform: scale(1.05);
        }

        .winner-text {
            color: #ffd700 !important;
            font-size: 72px !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⚔️ 像素机甲对战 ⚔️</h1>
        </div>

        <div class="health-bar-container">
            <div class="player-health player1">
                <span class="player-label">玩家1</span>
                <div class="health-bar">
                    <div class="health-fill" id="health1" style="width: 100%"></div>
                    <span class="health-text" id="healthText1">100/100</span>
                </div>
            </div>
            <div class="player-health player2">
                <span class="player-label">玩家2</span>
                <div class="health-bar">
                    <div class="health-fill" id="health2" style="width: 100%"></div>
                    <span class="health-text" id="healthText2">100/100</span>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="controls">
            <h3>🎮 操作说明</h3>
            <div class="control-layout">
                <div class="player-controls player1-controls">
                    <h4>玩家1 (红色)</h4>
                    <p>
                        <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动
                    </p>
                    <p>
                        <span class="key">Q</span> 攻击 | <span class="key">E</span> 防御
                    </p>
                </div>
                <div class="player-controls player2-controls">
                    <h4>玩家2 (青色)</h4>
                    <p>
                        <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> 移动
                    </p>
                    <p>
                        <span class="key">J</span> 攻击 | <span class="key">K</span> 防御
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <h2>🎮 像素机甲对战 🎮</h2>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <h2 class="winner-text" id="winnerText"></h2>
        <button onclick="restartGame()">再来一局</button>
    </div>

    <script src="mecha-battle.js"></script>
</body>
</html>

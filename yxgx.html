        /* 这里可以留空，样式由主页面继承 */
        .game-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .game-item-left span {
            font-size: 0.95rem;
            color: var(--text-color, #fff);
        }
        .game-item-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-icon {
            font-size: 0.85rem;
            color: #4CAF50;
        }
        .edit-btn {
            background: none;
            border: none;
            color: var(--text-color, #fff);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
        }
    </style>
</head>
